services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-app
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:GENERATE_WITH_php_artisan_key_generate
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: erp_konstruksi
      DB_USERNAME: erp_user
      DB_PASSWORD: erp_secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - erp

  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: erp_konstruksi
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp

volumes:
  mysql-data:
  app-storage:

networks:
  erp:
    driver: bridge
