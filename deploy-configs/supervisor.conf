; stdout_logfile=/var/log/supervisor/erp-event-listener.log
; stdout_logfile_maxbytes=20MB
; stdout_logfile_backups=5
; environment=APP_ENV=production,APP_DEBUG=false

; ==============================================================================
# GROUP DEFINITIONS (For managing related processes together)
; ==============================================================================

[group:erp-queues]
programs=erp-queue-high,erp-queue-default,erp-queue-low,erp-queue-rab-import,erp-queue-ai-classify

[group:erp-horizon-stack]
programs=erp-horizon,erp-scheduler

[group:erp-all]
programs=erp-horizon,erp-scheduler,erp-queue-high,erp-queue-default,erp-queue-low,erp-queue-rab-import,erp-queue-ai-classify

