; ==============================================================================
# MONITORING & HEALTH CHECKS
; ==============================================================================
# Supervisor HTTP endpoint: http://127.0.0.1:9001 (user: admin, pass: from env)
# Prometheus exporter available: https://github.com/beancount/supervisor_exporter
# Health check: supervisorctl status | grep -E "RUNNING|FATAL"