# ==============================================================================
# Nginx Configuration for Laravel ERP Konstruksi
# Production-ready config for Ubuntu 22.04/24.04 with PHP 8.3+, MySQL 8.0, Redis
# Supports Laravel 11 + React/Inertia + HTTPS + Security Headers + Gzip + Caching
# ==============================================================================

# Upstream PHP-FPM pool
upstream php_fpm {
    server unix:/run/php/php8.3-fpm.sock;
    # Alternative for TCP: server 127.0.0.1:9000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream for WebSocket (if using Laravel Echo/Reverb)
# upstream websocket_backend {
#     server 127.0.0.1:6001;
# }

server {
    listen 80;
    listen [::]:80;
    server_name erp.example.com www.erp.example.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/erp-konstruksi/public;
        allow all;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.example.com www.erp.example.com;

    root /var/www/erp-konstruksi/public;
    index index.php index.html index.htm;

    # ==========================================================================
    # SSL/TLS Configuration
    # ==========================================================================
    ssl_certificate /etc/letsencrypt/live/erp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/erp.example.com/chain.pem;

    # Modern SSL configuration (Mozilla Intermediate compatibility)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ==========================================================================
    # Security Headers
    # ==========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.example.com wss://erp.example.com; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

    # HSTS (enable after confirming HTTPS works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ==========================================================================
    # Connection Limits
    # ==========================================================================
    limit_conn conn_limit 50;
    limit_req zone=api_limit burst=20 nodelay;

    # ==========================================================================
    # Gzip Compression
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/x-font-truetype
        application/x-font-woff
        application/font-woff2
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # Brotli compression (requires ngx_brotli module)
    # brotli on;
    # brotli_vary on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==========================================================================
    # Client Body & Buffer Settings
    # ==========================================================================
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ==========================================================================
    # Static Asset Caching
    # ==========================================================================
    location ~* \.(?:css|js|map|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|json|xml|rss|atom)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        add_header Vary "Accept-Encoding";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Versioned assets (Vite/laravel-mix with hash in filename)
    location ~* \.(?:css|js|map|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|json|xml|rss|atom)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        add_header Vary "Accept-Encoding";
        access_log off;
        log_not_found off;
    }

    # ==========================================================================
    # Favicon and Robots
    # ==========================================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================================================
    # API Rate Limiting
    # ==========================================================================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        try_files $uri $uri/ /index.php?$query_string;

        # CORS headers for API
        add_header Access-Control-Allow-Origin "https://erp.example.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://erp.example.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Stricter rate limiting for auth endpoints
    location ~ ^/api/(login|register|password/email|password/reset) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_conn conn_limit 5;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # File upload endpoints
    location ~ ^/api/(purchase-orders|rab|invoices|goods-receipts)/.*/attachments {
        limit_req zone=upload_limit burst=5 nodelay;
        limit_conn conn_limit 3;
        client_max_body_size 50M;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================================================
    # Laravel Main Handler
    # ==========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================================================
    # PHP-FPM Handler
    # ==========================================================================
    location ~ \.php$ {
        # Security: Prevent PHP execution in upload directories
        location ~* /storage/.*\.php$ {
            deny all;
            return 403;
        }
        location ~* /bootstrap/.*\.php$ {
            deny all;
            return 403;
        }
        location ~* /config/.*\.php$ {
            deny all;
            return 403;
        }

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Security: Fix pathinfo
        try_files $fastcgi_script_name =404;

        # FastCGI Parameters
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;

        # FastCGI Tuning
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_connect_timeout 300s;
        fastcgi_intercept_errors off;

        # Caching
        fastcgi_cache_bypass $http_cache_control;
        fastcgi_no_cache $http_cache_control;

        # Security headers for PHP responses
        fastcgi_hide_header X-Powered-By;
    }

    # ==========================================================================
    # Laravel Octane / RoadRunner / Swoole (if used)
    # ==========================================================================
    # location / {
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ==========================================================================
    # WebSocket Proxy (Laravel Reverb / Pusher)
    # ==========================================================================
    # location /app {
    #     proxy_pass http://websocket_backend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 86400;
    #     proxy_send_timeout 86400;
    # }

    # ==========================================================================
    # Deny Access to Sensitive Files
    # ==========================================================================
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(env|git|gitignore|htaccess|htpasswd|lock|json|xml|yml|yaml|toml|ini|conf|config|bak|backup|sql|db)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|sql|sqlite|db|bak|backup|swp|tmp|temp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to vendor, node_modules, tests, storage (except public)
    location ~ ^/(vendor|node_modules|tests|storage/(?!app/public)) {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    # Block access to artisan, composer, package files
    location ~* (artisan|composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|webpack\.mix\.js|vite\.config\.js|tailwind\.config\.js|postcss\.config\.js|\.env|\.env\.*|phpunit\.xml|phpunit\.xml\.dist)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    # ==========================================================================
    # Storage Link (public access to storage/app/public)
    # ==========================================================================
    location /storage/ {
        alias /var/www/erp-konstruksi/storage/app/public/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;

        # Prevent PHP execution in storage
        location ~* \.php$ {
            deny all;
            return 403;
        }
    }

    # ==========================================================================
    # Health Check Endpoint
    # ==========================================================================
    location = /up {
        access_log off;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    # ==========================================================================
    # Logging
    # ==========================================================================
    access_log /var/log/nginx/erp-konstruksi-access.log combined buffer=16k flush=30s;
    error_log /var/log/nginx/erp-konstruksi-error.log warn;

    # ==========================================================================
    # Additional Security
    # ==========================================================================
    # Hide Nginx version
    server_tokens off;

    # Buffer large client requests to disk
    client_body_in_file_only clean;
    client_body_temp_path /var/cache/nginx/client_temp;

    # Timeout for keep-alive connections
    keepalive_timeout 65;
    keepalive_requests 100;
}

